name: Rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  BUILD_DIR: "${{ github.workspace }}/build/"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - uses: actions/checkout@v6
      - uses: lukka/get-cmake@latest

      - name: Nightly with rustfmt and clippy
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Add msbuild to PATH (Windows)
        if: matrix.os == 'windows-latest'
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "16"


      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential mercurial make autoconf automake libtool libasound2-dev libpulse-dev libaudio-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev libxinerama-dev libxxf86vm-dev libxss-dev libgl1-mesa-dev libfreetype6-dev

      - name: Install autoconf (macOS)
        if: contains(matrix.os, 'macos')
        run: |
          brew update
          brew install autoconf

      - name: Test crate
        run: cargo test --verbose --features vendor,ttf,mixer
      - name: Clippy Check
        run: cargo clippy --verbose --features vendor,ttf,mixer
      - name: Create docs
        if: matrix.os == 'ubuntu-latest'
        run: cargo +nightly doc --features vendor,nightly,vulkan,simd_allocator,ttf,mixer --no-deps
      - name: Publish test
        if: matrix.os == 'ubuntu-latest'
        working-directory: ./rich-sdl2-rust-sys
        run: cargo publish --dry-run --features vendor


      - name: Upload Build Output on Failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: build-failure-logs
          path: target/debug/build/rich-sdl2-rust-sys-*/
          retention-days: 5

      - uses: actions/upload-artifact@v6
        if: matrix.os == 'ubuntu-latest'
        with:
          name: doc-artifact
          path: target/doc/
